nc: 80
scales:
  # Sử dụng scale n của YOLO11: depth_multiple=0.5, width_multiple=0.25
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  # [from, repeats, module, args]
  # Stage 0: Stem
  - [-1, 1, Conv, [64, 3, 2]]          # 0-P1/2
  # Stage 1: Fused-MBConv (L=2)
  - [-1, 1, FusedMBConv, [64, 1, 1]]   # 1-P1/2
  # Stage 2: Fused-MBConv (L=4)
  - [-1, 2, FusedMBConv, [128, 2, 4]]  # 2-P2/4
  # Stage 3: Fused-MBConv (L=4) -> Kết nối P3
  - [-1, 2, FusedMBConv, [256, 2, 4]]  # 3-P3/8
  # Stage 4: MBConv (L=6) -> Kết nối P4
  - [-1, 3, MBConv, [512, 2, 4]]       # 4-P4/16
  # Stage 5: MBConv (L=9, stride 1)
  - [-1, 2, MBConv, [512, 1, 4]]       # 5-P4/16
  # Stage 6: MBConv (L=15) -> Kết nối P5
  - [-1, 2, MBConv, [1024, 2, 5]]      # 6-P5/32
  # Thành phần bổ trợ cho YOLO11 (Đã bỏ C2PSA, chỉ giữ SPPF)
  - [-1, 1, SPPF, [1024, 5]]           # 7-P5/32

head:
  # -------- Top-down pathway --------
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 8 (P4/16)
  - [[-1, 5], 1, Concat, [1]]                   # 9 cat backbone P4 (Layer 5)
  - [-1, 2, C3k2, [512, False]]                 # 10 (P4-medium)
  - [-1, 1, EMA, [512, 8]]                      # 11 (EMA trên P4)

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 12 (P3/8)
  - [[-1, 3], 1, Concat, [1]]                   # 13 cat backbone P3 (Layer 3)
  - [-1, 3, C3k2, [256, False]]                 # 14 (P3-small)
  - [-1, 1, EMA, [256, 8]]                      # 15 (EMA trên P3 -> Input 1 của Detect)

  # -------- Bottom-up pathway --------
  - [-1, 1, Conv, [256, 3, 2]]                  # 16 (P4/16)
  - [[-1, 11], 1, Concat, [1]]                  # 17 (Nối với layer 11 để lấy đặc trưng đã qua EMA)
  - [-1, 2, C3k2, [512, False]]                 # 18 (P4-medium)
  - [-1, 1, EMA, [512, 8]]                      # 19 (EMA trên P4 -> Input 2 của Detect)

  - [-1, 1, Conv, [512, 3, 2]]                  # 20 (P5/32)
  - [[-1, 7], 1, Concat, [1]]                   # 21 cat backbone P5 (Trở về nối với Layer 7 - SPPF)
  - [-1, 2, C3k2, [1024, True]]                 # 22 (P5-large -> Input 3 của Detect)

  # Detect lấy đầu ra tương ứng từ các nhánh P3, P4, P5
  - [[15, 19, 22], 1, Detect, [nc]]             # 23 Detect(P3, P4, P5)