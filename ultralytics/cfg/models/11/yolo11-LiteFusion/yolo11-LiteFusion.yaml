# YOLO11-LiteFusion: MobileNetV4 backbone + LiteFusion neck (weighted fusion + ECA)
# ================================================================================
# Ý tưởng:
#   - Backbone dùng MobileNetV4 (MNV4Conv / MNV4UIB Extra-DW) — nhẹ, expand thấp,
#     bỏ SE để tiết kiệm params so với C3k2 mặc định.
#   - Neck dùng LiteFusion: 1 block duy nhất gộp (1x1 align) + (BiFPN-style
#     weighted fusion) + (DWConv 3x3 spatial mix) + (ECA channel gate) + residual.
#     Giảm số Concat+Conv riêng lẻ, cho trọng số học được giữa các scale.
#   - Layer 16 là fusion 3-input (bi-directional BiFPN thu gọn): PAN path +
#     top-down P4 đã refined + skip backbone P4.
#
# Target scale cho Tesla P100 16GB: dùng scale 's' (width=0.50, depth=0.50).

nc: 80
scales:
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]    # Recommended cho P100
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,      [64, 3, 2]]           # 0  P1/2  stem
  - [-1, 1, MNV4Conv,  [64, 1, 1]]           # 1  FusedIB expand=1
  - [-1, 2, MNV4Conv,  [128, 2, 2]]          # 2  P2/4
  - [-1, 2, MNV4Conv,  [256, 2, 2]]          # 3  P3/8   <- skip to neck
  - [-1, 2, MNV4UIB,   [512, 2, 2]]          # 4  P4/16  <- skip to neck
  - [-1, 2, MNV4UIB,   [512, 1, 2]]          # 5  deeper P4
  - [-1, 2, MNV4UIB,   [1024, 2, 3]]         # 6  P5/32
  - [-1, 1, SPPF,      [1024, 5]]            # 7
  - [-1, 2, C2PSA,     [1024]]               # 8  P5 with PSA attention

head:
  # -------- Top-down (FPN) với LiteFusion --------
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]      # 9   up P5 -> /16
  - [[-1, 5], 1, LiteFusion, [512]]                 # 10  fuse(up_P5, backbone_P4_deep)
  - [-1, 2, C3k2, [512, False]]                     # 11  P4-refined

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]      # 12  up -> /8
  - [[-1, 3], 1, LiteFusion, [256]]                 # 13  fuse(up_P4, backbone_P3)
  - [-1, 2, C3k2, [256, False]]                     # 14  P3-out (small-object)

  # -------- Bottom-up (PAN) với LiteFusion --------
  - [-1, 1, Conv, [256, 3, 2]]                      # 15  down P3 -> /16
  - [[-1, 11, 5], 1, LiteFusion, [512]]             # 16  TRI-input fuse
  - [-1, 2, C3k2, [512, False]]                     # 17  P4-out

  - [-1, 1, Conv, [512, 3, 2]]                      # 18  down P4 -> /32
  - [[-1, 8], 1, LiteFusion, [1024]]                # 19  fuse(PAN_P5, backbone_P5_PSA)
  - [-1, 2, C3k2, [1024, True]]                     # 20  P5-out

  # Detect
  - [[14, 17, 20], 1, Detect, [nc]]                 # 21 Detect(P3, P4, P5)
